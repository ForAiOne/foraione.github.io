<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test FormSubmit</title>
</head>
<body style="font-family: Arial; padding: 50px;">
    <h1>Test Formulaire</h1>
    
    <form action="https://formsubmit.co/nomug2020@gmail.com" method="POST">
        <div style="margin-bottom: 15px;">
            <label>Nom:</label><br>
            <input type="text" name="test_nom" required style="padding: 10px; width: 300px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Email:</label><br>
            <input type="email" name="test_email" required style="padding: 10px; width: 300px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Message:</label><br>
            <textarea name="test_message" required style="padding: 10px; width: 300px; height: 100px;"></textarea>
        </div>
        <button type="submit" style="padding: 10px 20px; background: #b91d1d; color: white; border: none; cursor: pointer;">Envoyer</button>
    </form>
</body>
</html>
